version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "America/Chicago"
    labels:
      - "dependencies"
      - "security"
      - "github-actions"

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "daily"
      time: "03:30"
      timezone: "America/Chicago"
    labels:
      - "dependencies"
      - "security"
      - "rust"
